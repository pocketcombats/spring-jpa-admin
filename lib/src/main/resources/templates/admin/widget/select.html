<!--/*@thymesVar id="field" type="com.pocketcombats.admin.data.form.AdminFormField"*/-->
<!--/*@thymesVar id="hasErrors" type="boolean"*/-->
<select th:id="${'model-field-' + field.name}"
        th:name="${'model-field-' + field.name}"
        class="form-select w-auto"
        th:classappend="${hasErrors ? 'is-invalid' : ''}"
        th:aria-invalid="${hasErrors ? 'true' : null}"
        th:aria-describedby="${hasErrors ? 'model-field-' + field.name + '-errors' : null}"
        th:disabled="${field.readonly()}">
    <!--/*@thymesVar id="option" type="com.pocketcombats.admin.widget.Option"*/-->
    <option th:each="option : ${field.templateData['_options']}"
            th:value="${option.id}"
            th:selected="${field.value == option.id}">
        <th:block th:if="${option.localize}" th:text="#{${option.label}}"/>
        <th:block th:unless="${option.localize}" th:text="${option.label}"/>
    </option>
</select>
<!--/* Rendered only when a widget caps its preloaded options.
       Widgets that never truncate (enums, small tables) omit the "_truncated" contract. */-->
<div th:if="${field.templateData['_truncated']}"
     class="form-text text-warning"
     role="status"
     th:text="${#messages.msgOrNull('spring-jpa-admin.widget.select.truncated', field.templateData['_shownCount'], field.templateData['_totalApprox'])
               ?: ('Showing ' + field.templateData['_shownCount'] + ' of ' + field.templateData['_totalApprox'] + ' options')}">Showing some options</div>
